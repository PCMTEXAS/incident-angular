<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">

  <!-- Background geometric shapes -->
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-10 col-lg-11">
        <div class="card login-card shadow-lg border-0 overflow-hidden">
          <div class="row g-0">

            <!-- ── LEFT PANEL: Branding ──────────────────────── -->
            <div class="col-lg-6 brand-panel d-flex flex-column align-items-center justify-content-center text-white p-5">
              <div class="brand-logo mb-4">
                <i class="bi bi-shield-check display-1"></i>
              </div>
              <h1 class="fw-bold mb-2 text-center fs-2">EHS Incident Portal</h1>
              <p class="text-white-75 text-center mb-4">
                Powered by DigitalChalk Safety Solutions
              </p>

              <!-- Image slot -->
              <div class="logo-image-slot mb-4">
                <img src="assets/company-logo.png" alt="Company Logo"
                     class="img-fluid rounded-3 shadow"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="logo-placeholder" style="display:none">
                  <i class="bi bi-building fs-2 text-white-50"></i>
                  <small class="text-white-50 mt-2 text-center">Add company-logo.png<br>to public/assets/</small>
                </div>
              </div>

              <div class="text-center">
                <div class="d-flex gap-3 justify-content-center mb-2">
                  <div class="feature-badge">
                    <i class="bi bi-clipboard-check me-1"></i> OSHA 300
                  </div>
                  <div class="feature-badge">
                    <i class="bi bi-robot me-1"></i> AI Analysis
                  </div>
                </div>
                <div class="d-flex gap-3 justify-content-center">
                  <div class="feature-badge">
                    <i class="bi bi-graph-up me-1"></i> Dashboard
                  </div>
                  <div class="feature-badge">
                    <i class="bi bi-person-badge me-1"></i> HRIS Sync
                  </div>
                </div>
              </div>
            </div>

            <!-- ── RIGHT PANEL: Login Form ───────────────────── -->
            <div class="col-lg-6 d-flex align-items-center p-5">
              <div class="w-100">
                <div class="text-center mb-4">
                  <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
                  <p class="text-muted">Sign in to access the incident portal</p>
                </div>

                <!-- Invite welcome message -->
                <div *ngIf="inviteMsg" class="alert alert-info py-2 d-flex align-items-center mb-3">
                  <i class="bi bi-envelope-check me-2"></i>
                  <small>{{ inviteMsg }}</small>
                </div>

                <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

                  <!-- User ID -->
                  <div class="mb-3">
                    <label for="userId" class="form-label fw-semibold text-dark">
                      <i class="bi bi-person me-1 text-primary"></i>User ID
                    </label>
                    <input
                      id="userId"
                      type="text"
                      class="form-control form-control-lg"
                      [(ngModel)]="userId"
                      name="userId"
                      placeholder="Enter your User ID"
                      autocomplete="username"
                      required>
                  </div>

                  <!-- Password -->
                  <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-dark">
                      <i class="bi bi-lock me-1 text-primary"></i>Password
                    </label>
                    <div class="input-group">
                      <input
                        id="password"
                        [type]="showPassword ? 'text' : 'password'"
                        class="form-control form-control-lg"
                        [(ngModel)]="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required>
                      <button
                        type="button"
                        class="btn btn-outline-secondary"
                        (click)="showPassword = !showPassword"
                        tabindex="-1">
                        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                      </button>
                    </div>
                  </div>

                  <!-- Error message -->
                  <div *ngIf="errorMessage" class="alert alert-danger py-2 d-flex align-items-center mb-3">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <small>{{ errorMessage }}</small>
                  </div>

                  <!-- Submit -->
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg w-100 fw-semibold"
                    [disabled]="loading || !userId || !password">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                    <i *ngIf="!loading" class="bi bi-box-arrow-in-right me-2"></i>
                    {{ loading ? 'Signing in…' : 'Sign In' }}
                  </button>

                </form>

                <div class="text-center mt-4">
                  <small class="text-muted">
                    <i class="bi bi-shield-lock me-1"></i>
                    Secured · OSHA 29 CFR 1904 Compliant
                  </small>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

</div>
